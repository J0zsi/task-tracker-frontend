<div class="bg-white text-gray-900 font-sans container my-auto mx-auto px-6 py-8 max-w-lg">
  <h1 class="text-red-600 text-2xl font-bold mb-4">Oops! An Error Occurred</h1>
  <h2 class="text-lg font-semibold mb-4">The server was unable to complete your request.</h2>
  <p class="text-base mb-5">
    Something is broken. Please let us know what you were doing when this error occurred. We will
    fix it as soon as possible. Sorry for any inconvenience caused.
  </p>
  <div class="flex items-center justify-center gap-x-6">
    <a tuiButton size="m" [routerLink]="[routes.TASKS]"> Go to tasks </a>
  </div>
</div>
