<tui-root>
  <app-root-layout>
    @if (loadingService.isLoading()) {
      <progress tuiProgressBar size="s" class="fixed! top-0 left-0 right-0 z-50"></progress>
    }

    @if (isFirstNavigationLoading()) {
      <tui-loader class="my-auto self-center" size="xxl" />
    }
    <router-outlet />
  </app-root-layout>
</tui-root>
